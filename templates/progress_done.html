<!DOCTYPE html>
<html>
<head>
    <title>Progress Complete</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="dashboard-page">

<div class="dashboard">

<div class="sidebar">
    <h2>Well Done 🎉</h2>
    <p class="username">{{ username }}</p>
</div>

<div class="content">
<div class="main-box">

    <h2>🎉 Great Progress!</h2>
    <p>You completed all recommended activities for today.</p>

    <br>

    <h3>Completed Activities:</h3>

    <ul class="completed-list">
        {% for activity in completed_today %}
            <li>✅ {{ activity.title() }}</li>
        {% endfor %}
    </ul>

    <br>

    <div class="actions">
        <a href="/progress" class="btn primary">
            View Full Progress
        </a>

        <a href="/dashboard" class="btn secondary">
            Go to Dashboard
        </a>
    </div>

</div>
</div>

</div>

</body>
</html>
